name: Verify

on:
  pull_request:
  push:
    branches:
      - main
      - 'codex/**'
  merge_group:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      QINIU_API_KEY: ${{ secrets.QINIU_API_KEY }}
      QINIU_ENABLE_LIVE_VERIFY_GATE: ${{ secrets.QINIU_API_KEY != '' && '1' || '0' }}
      QINIU_LIVE_VERIFY_PROFILE: pr
      QINIU_LIVE_VERIFY_GATE_STRICT: 0
      QINIU_LIVE_VERIFY_POLICY_PATH: .trellis/spec/sdk/live-verify-policy.json
      QINIU_LIVE_VERIFY_OUTPUT: artifacts/live-verify-gate.json
      QINIU_LIVE_VERIFY_SUMMARY_OUTPUT: artifacts/live-verify-gate.md
      QINIU_REVIEW_PACKET_OUTPUT: artifacts/review-packet.md
      QINIU_PROMOTION_DECISIONS_OUTPUT: artifacts/promotion-decisions.md
      QINIU_VERIFICATION_REPORT_OUTPUT: artifacts/verification-report.md
      QINIU_PHASE2_CLOSEOUT_REPORT_OUTPUT: artifacts/phase2-closeout-report.md
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run repository verification gate
        run: npm run test:ci

      - name: Render live verification summary artifact
        if: always()
        run: npm run generate:live-verify-summary

      - name: Render review packet artifact
        if: always()
        run: npm run generate:review-packet

      - name: Render promotion decision artifact
        if: always()
        run: npm run generate:promotion-decisions

      - name: Render aggregated verification report
        if: always()
        run: npm run generate:verification-report

      - name: Render Phase 2 closeout report
        if: always()
        run: npm run generate:phase2-closeout-report

      - name: Upload live verification artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: live-verify-gate
          path: |
            artifacts/live-verify-gate.json
            artifacts/live-verify-gate.md
            artifacts/review-packet.md
            artifacts/promotion-decisions.md
            artifacts/verification-report.md
            artifacts/phase2-closeout-report.md
          if-no-files-found: ignore
